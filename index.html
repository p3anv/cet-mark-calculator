<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MHT CET MBA Score Calculator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Inter, system-ui, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      overflow-x:hidden;
    }

    .bg{
      position:fixed;
      inset:0;
      background:
      radial-gradient(circle at top left,#1e3a8a 0%,transparent 30%),
      radial-gradient(circle at bottom right,#7c3aed 0%,transparent 30%),
      #0f172a;
      z-index:-1;
    }

    .container{
      width:min(1200px,95%);
      margin:auto;
      padding:40px 0;
    }

    .hero{
      text-align:center;
      margin-bottom:40px;
    }

    .hero h1{
      font-size:3rem;
      font-weight:800;
      background:linear-gradient(90deg,#60a5fa,#c084fc);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .hero p{
      color:#cbd5e1;
      margin-top:10px;
      font-size:1.1rem;
    }

    .upload-box{
      border:2px dashed rgba(255,255,255,0.2);
      border-radius:24px;
      padding:60px 30px;
      text-align:center;
      background:rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      transition:0.3s;
      cursor:pointer;
    }

    .upload-box:hover{
      border-color:#60a5fa;
      transform:translateY(-3px);
    }

    input[type=file]{
      display:none;
    }

    .upload-btn{
      display:inline-block;
      margin-top:20px;
      padding:14px 28px;
      border-radius:16px;
      background:linear-gradient(90deg,#2563eb,#7c3aed);
      color:white;
      font-weight:700;
      cursor:pointer;
      transition:0.3s;
    }

    .upload-btn:hover{
      transform:scale(1.05);
    }

    .results{
      margin-top:40px;
      display:none;
      animation:fade 0.5s ease;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(10px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:30px;
    }

    .card{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(12px);
      border-radius:24px;
      padding:25px;
    }

    .card h3{
      color:#94a3b8;
      margin-bottom:10px;
      font-size:0.95rem;
    }

    .card .value{
      font-size:2rem;
      font-weight:800;
    }

    table{
      width:100%;
      border-collapse:collapse;
      overflow:hidden;
      border-radius:20px;
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(12px);
    }

    th,td{
      padding:18px;
      text-align:left;
    }

    th{
      background:rgba(255,255,255,0.08);
      color:#cbd5e1;
    }

    tr{
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    tr:hover{
      background:rgba(255,255,255,0.03);
    }

    .footer{
      margin-top:50px;
      text-align:center;
      color:#64748b;
      font-size:0.9rem;
    }

    .success{
      color:#22c55e;
    }

    .danger{
      color:#ef4444;
    }

  </style>
</head>

<body>

<div class="bg"></div>

<div class="container">

  <div class="hero">
    <h1>MHT CET MBA Score Analyzer</h1>
    <p>Upload your response sheet HTML and get instant section-wise analysis.</p>
  </div>

  <label class="upload-box">

    <h2>Drop your Response Sheet here</h2>
    <p style="margin-top:10px;color:#94a3b8;">
      Supports official objection tracker HTML file
    </p>

    <div class="upload-btn">
      Choose HTML File
    </div>

    <input type="file" id="fileInput" accept=".html,.htm">

  </label>

  <div class="results" id="results">

    <div class="cards">

      <div class="card">
        <h3>Total Questions</h3>
        <div class="value" id="totalQuestions">0</div>
      </div>

      <div class="card">
        <h3>Correct Answers</h3>
        <div class="value success" id="correctAnswers">0</div>
      </div>

      <div class="card">
        <h3>Wrong Answers</h3>
        <div class="value danger" id="wrongAnswers">0</div>
      </div>

      <div class="card">
        <h3>Total Marks</h3>
        <div class="value" id="totalMarks">0</div>
      </div>

    </div>

    <table>
      <thead>
        <tr>
          <th>Section</th>
          <th>Total</th>
          <th>Correct</th>
          <th>Wrong</th>
          <th>Accuracy</th>
          <th>Marks</th>
        </tr>
      </thead>

      <tbody id="tableBody"></tbody>

    </table>

  </div>

  <div class="footer">
    Built for MHT CET MBA/CET Response Sheet Analysis
  </div>

</div>

<script>

const fileInput = document.getElementById("fileInput");

fileInput.addEventListener("change", handleFile);

function handleFile(event){

  const file = event.target.files[0];

  if(!file){
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){

    const html = e.target.result;

    analyzeHTML(html);

  };

  reader.readAsText(file);

}

function analyzeHTML(html){

  const pattern = /<td>\s*([A-Z &]+)\s*<\/td>[\s\S]*?Correct Option:<\/b>\s*<span>(\d+)<\/span>[\s\S]*?Candidate Response:<\/b>\s*<span>(\d+)/g;

  let match;

  let total = 0;
  let correct = 0;
  let wrong = 0;

  const sectionData = {};

  while((match = pattern.exec(html)) !== null){

    const section = match[1].trim();
    const correctOption = match[2];
    const candidateResponse = match[3];

    if(!sectionData[section]){

      sectionData[section] = {
        total:0,
        correct:0,
        wrong:0
      };

    }

    sectionData[section].total++;
    total++;

    if(correctOption === candidateResponse){

      sectionData[section].correct++;
      correct++;

    }else{

      sectionData[section].wrong++;
      wrong++;

    }

  }

  document.getElementById("results").style.display = "block";

  document.getElementById("totalQuestions").innerText = total;
  document.getElementById("correctAnswers").innerText = correct;
  document.getElementById("wrongAnswers").innerText = wrong;
  document.getElementById("totalMarks").innerText = correct;

  const tableBody = document.getElementById("tableBody");

  tableBody.innerHTML = "";

  Object.entries(sectionData).forEach(([section,data])=>{

    const accuracy = ((data.correct/data.total)*100).toFixed(1);

    tableBody.innerHTML += `
      <tr>
        <td>${section}</td>
        <td>${data.total}</td>
        <td class="success">${data.correct}</td>
        <td class="danger">${data.wrong}</td>
        <td>${accuracy}%</td>
        <td>${data.correct}</td>
      </tr>
    `;

  });

}

</script>

</body>
</html>
